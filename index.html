<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1b3a2a" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Daara" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- SEO / Meta -->
    <title>Daara — Coran & Alphabet Arabe</title>
    <meta name="description" content="Application d'apprentissage du Coran et de l'alphabet arabe pour enfants" />

    <!-- Icône favicon -->
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Enregistrement du Service Worker -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js")
            .then((reg) => console.log("✅ SW enregistré:", reg.scope))
            .catch((err) => console.warn("❌ SW erreur:", err));
        });
      }
    </script>
  </body>
</html>
